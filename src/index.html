<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>SnapTools — Outils gratuits hors-ligne</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="SnapTools regroupe 10 outils gratuits et rapides : calcul brut/net, calculatrice scientifique, rendement bourse, convertisseur de devises, dictionnaire, traducteur et plus, utilisables hors-ligne.">
  <meta name="theme-color" content="#0087e6">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="manifest" href="manifest.webmanifest">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('snaptools.theme');
        var dark = saved === 'dark' || (saved !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
  <noscript>Veuillez activer JavaScript pour utiliser SnapTools.</noscript>
</body>
</html>
